<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva solicitud de cuponera</title>
</head>
<body style="margin:0; padding:0; background:#f3f4f6;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#f3f4f6; padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:520px; background:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 4px 18px rgba(0,0,0,0.06);">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#152A47,#1E3A6E); padding:28px 28px 22px;">
              <p style="margin:0 0 6px; font:700 12px/1 Arial, sans-serif; color:#FFBF46; letter-spacing:.6px; text-transform:uppercase;">Enjoy · Panel</p>
              <h1 style="margin:0; font:800 20px/1.3 Arial, sans-serif; color:#ffffff;">Nueva solicitud de cuponera 🎟️</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:24px 28px 8px;">
              <p style="margin:0 0 16px; font:14px/22px Arial, sans-serif; color:#374151;">
                Llegó una nueva solicitud de cuponera que necesita revisión.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border:1px solid #e5e7eb; border-radius:12px; overflow:hidden;">
                <tr>
                  <td style="padding:12px 16px; background:#f9fafb; font:600 12px/1 Arial, sans-serif; color:#6b7280; width:120px;">Cliente</td>
                  <td style="padding:12px 16px; font:14px/20px Arial, sans-serif; color:#111827;">{{nombreCliente}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px; background:#f9fafb; font:600 12px/1 Arial, sans-serif; color:#6b7280; border-top:1px solid #e5e7eb;">Correo</td>
                  <td style="padding:12px 16px; font:14px/20px Arial, sans-serif; color:#111827; border-top:1px solid #e5e7eb;">{{emailCliente}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px; background:#f9fafb; font:600 12px/1 Arial, sans-serif; color:#6b7280; border-top:1px solid #e5e7eb;">Cuponera</td>
                  <td style="padding:12px 16px; font:14px/20px Arial, sans-serif; color:#111827; border-top:1px solid #e5e7eb;">{{cuponera}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px; background:#f9fafb; font:600 12px/1 Arial, sans-serif; color:#6b7280; border-top:1px solid #e5e7eb;">Monto</td>
                  <td style="padding:12px 16px; font:14px/20px Arial, sans-serif; color:#111827; border-top:1px solid #e5e7eb;">{{monto}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px; background:#f9fafb; font:600 12px/1 Arial, sans-serif; color:#6b7280; border-top:1px solid #e5e7eb;">Fecha</td>
                  <td style="padding:12px 16px; font:14px/20px Arial, sans-serif; color:#111827; border-top:1px solid #e5e7eb;">{{fecha}}</td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- CTA -->
          <tr>
            <td style="padding:20px 28px 28px;" align="center">
              <a href="https://portal.ecuenjoy.com/solicitudes-cuponera"
                 style="display:inline-block; background:#FF9F1C; color:#ffffff; text-decoration:none; font:700 14px/1 Arial, sans-serif; padding:14px 28px; border-radius:12px;">
                Revisar solicitud
              </a>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 28px; background:#f9fafb; border-top:1px solid #e5e7eb;">
              <p style="margin:0; font:12px/18px Arial, sans-serif; color:#9ca3af;">© {{anio}} Enjoy · Notificación automática del panel.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
